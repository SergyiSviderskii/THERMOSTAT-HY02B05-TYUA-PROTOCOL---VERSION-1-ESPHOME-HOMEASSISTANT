                  case 16:
                    if ((id(number_hour_6).state * 60  + x ) <= (id(number_hour_1).state * 60 + id(number_minutes_1).state) || \
                      (id(number_hour_6).state * 60  + x ) <= (id(number_hour_5).state * 60 + id(number_minutes_5).state)) { 
                      x = id(number_minutes_6).state;  
                    id(number_minutes_6).publish_state(x + 1);
                    }
                    id(number_minutes_6).publish_state(x);  
                    break;  
                  case 17:
                    if (x > id(number_max_temperature).state) {
                      x = id(number_max_temperature).state; 
                      id(number_temperature_6).publish_state(x - 1); 
                    }  
                    if (x < id(number_min_temperature).state) {
                      x = id(number_min_temperature).state; 
                      id(number_temperature_6).publish_state(x + 1); 
                    }               
                    id(number_temperature_6).publish_state(x);   
                    break;                    
                  default:
                    break;
                } 
                
                value_points = {(uint8_t)id(number_hour_1).state, (uint8_t)id(number_minutes_1).state, (uint8_t)id(number_temperature_1).state,
                                (uint8_t)id(number_hour_2).state, (uint8_t)id(number_minutes_2).state, (uint8_t)id(number_temperature_2).state,
                                (uint8_t)id(number_hour_3).state, (uint8_t)id(number_minutes_3).state, (uint8_t)id(number_temperature_3).state};             
            
                value_points_1 = {(uint8_t)id(number_hour_4).state, (uint8_t)id(number_minutes_4).state, (uint8_t)id(number_temperature_4).state,
                                  (uint8_t)id(number_hour_5).state, (uint8_t)id(number_minutes_5).state, (uint8_t)id(number_temperature_5).state,
                                  (uint8_t)id(number_hour_6).state, (uint8_t)id(number_minutes_6).state, (uint8_t)id(number_temperature_6).state}; 
                                   
                if ((value_points != id(thermostat_component).datapoint_id_1->value_raw) || \
                    (value_points_1 != id(thermostat_component).datapoint_id_2->value_raw)) {
                  if (!id(cansel).state)
                    id(cansel).turn_on();
                } else {
                  if (id(cansel).state)
                    id(cansel).turn_off();                
                }
                if(id(save).state) {   
                  id(thermostat_component).set_raw_datapoint_value(id(thermostat_component).datapoint_id_1->id, value_points);
                  delay (100);
                  id(thermostat_component).set_raw_datapoint_value(id(thermostat_component).datapoint_id_2->id, value_points_1);  
                }
                
  - id: reload_config 
    then:
      - lambda: |-    
          id(my_climate).set_visual_min_temperature_override(id(min_temperature).state);   
          id(my_climate).set_visual_max_temperature_override(id(max_temperature).state);
      - homeassistant.service: 
          service: homeassistant.reload_config_entry 
          data: 
            entity_id: ${reload_config}                 
            
  - id: script_lock_on
    then:
      - delay: 60000ms   
      - switch.turn_on: lock_datapoint
      
  - id: script_delay_reload_config
    then:
      - delay: 5000ms 
      - script.execute: reload_config

  - id: script_mode_memory
    then:
      - delay: 10000ms     
      - lambda: |-
          auto index = id(options_mode).active_index();
          if (index.has_value() && id(my_global_mode) != index.value() && (index.value() != 3 || index.value() != 4) && (tuya::TuyaInitState::INIT_DONE == id(thermostat_component).get_init_state())) {
            id(my_global_mode) = index.value();
          }       
            
                  
