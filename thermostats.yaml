                      (x * 60 + id(number_minutes_3).state) >= (id(number_hour_4).state * 60 + id(number_minutes_4).state)) { 
                      x = id(number_hour_3).state; 
                    id(number_hour_3).publish_state(x + 1); 
                    }    
