                      id(number_temperature_3).publish_state(x + 1); 
                    }               
                    id(number_temperature_3).publish_state(x); 
                    break;   
                  case 9:
                    if ((x * 60 + id(number_minutes_4).state) <= (id(number_hour_3).state * 60 + id(number_minutes_3).state) || \
                      (x * 60 + id(number_minutes_4).state) >= (id(number_hour_5).state * 60 + id(number_minutes_5).state)) { 
                      x = id(number_hour_4).state; 
                    id(number_hour_4).publish_state(x + 1); 
                    }
                    id(number_hour_4).publish_state(x);   
