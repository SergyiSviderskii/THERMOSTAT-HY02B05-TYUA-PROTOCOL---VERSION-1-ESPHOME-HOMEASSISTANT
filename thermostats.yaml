                    if ((id(number_hour_3).state * 60  + x ) <= (id(number_hour_2).state * 60 + id(number_minutes_2).state) || \
                      (id(number_hour_3).state * 60  + x ) >= (id(number_hour_4).state * 60 + id(number_minutes_4).state)) { 
