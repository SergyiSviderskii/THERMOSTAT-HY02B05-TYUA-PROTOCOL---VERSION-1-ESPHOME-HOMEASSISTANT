# Enable Home Assistant API
api:
  #encryption:
   # key: "$key_api
  reboot_timeout: $reboot_timeout  
  services:
    - service: connected
      variables:
        my_connected: bool
      then:
        - lambda: |-
            id(thermostat_connected_switch_heatet).publish_state(my_connected); 


uart:
  rx_pin: GPIO3
  tx_pin: GPIO1
  baud_rate: 9600 
 
 
globals:
  - id: my_global_mode
    type: int
    restore_value: true   
 
    
external_components:
  - source:
      type: local
      path: components/my_components/my_tuya
    refresh: 1d
    components: all 
 
  
tuya:
  id: thermostat_component
  time_id: homeassistant_time
  ignore_mcu_update_on_datapoints: 
  - 101
  - 108
  on_datapoint_update:
    - sensor_datapoint: 114
      datapoint_type: int
      then:
        - if:     
            condition: 
              switch.is_off: setting_points 
            then: 
              - if:     
                  condition:              
                    lambda: |-
                      return x != id(max_temperature).state;
                  then:
                    lambda: |-
                      id(max_temperature).publish_state(x);   
    - sensor_datapoint: 115
      datapoint_type: int
      then:
        - if:     
            condition:  
              switch.is_off: setting_points
            then: 
              - if:     
                  condition:              
                    lambda: |-
                      return x != id(min_temperature).state;
                  then:
                    lambda: |-
                      id(min_temperature).publish_state(x);            
    - sensor_datapoint: 12
      datapoint_type: bitmask
      then:
        - lambda: |-
            ESP_LOGD("main", "on_datapoint_update %#08X", x);      
            if (x == 0) {id(error).publish_state("No");}
            if (x == 2) {id(error).publish_state("Internal sensor");}
            if (x == 4) {id(error).publish_state("External sensor");}
            if (x == 8) {id(error).publish_state("Lower temperature threshold");}
            if (x == 16) {id(error).publish_state("Upper temperature threshold");} 
    - sensor_datapoint: 119
      datapoint_type: raw
      then: 
        - if:     
            condition: 
              and:
                - switch.is_on: work_points  
                - switch.is_on: save 
                - switch.is_on: cansel
            then:
              lambda: |- 
                id(thermostat_component).get_datapoint_addition (119, false); 
    - sensor_datapoint: 120
      datapoint_type: raw
      then: 
        - if:     
            condition:   
              and:
                - switch.is_on: work_points  
                - switch.is_on: save 
                - switch.is_on: cansel
            then:
              lambda: |- 
                id(thermostat_component).get_datapoint_addition (120, true);   
    - sensor_datapoint: 121
      datapoint_type: raw
      then: 
        - if:     
            condition:   
              and:
                - switch.is_on: week_points  
                - switch.is_on: save  
                - switch.is_on: cansel
            then:
              lambda: |- 
                id(thermostat_component).get_datapoint_addition (121, false);   
    - sensor_datapoint: 122
      datapoint_type: raw
      then: 
        - if:     
            condition:   
              and:
                - switch.is_on: week_points  
                - switch.is_on: save   
                - switch.is_on: cansel                
            then:
              lambda: |- 
                id(thermostat_component).get_datapoint_addition (122, true);   
        - switch.turn_off: save        
        - switch.turn_off: cansel
 
# configuration overload             
script:
  - id: script_switch_off
    mode: queued
    then:
      - delay: 100ms  
      - if:     
          condition:
            or:
              - and:
                  - switch.is_off: switch_power
                  - switch.is_off: lock_datapoint
              - switch.is_on: lock_datapoint 
          then: 
            - if:     
                condition:  
                  switch.is_on: setting
                then:  
                  switch.turn_off: setting  
          else:
            - script.stop: script_lock_on
            - script.execute: script_lock_on             
      - if:     
          condition: 
            switch.is_off: setting
          then: 
            - if:     
                condition: 
                  switch.is_on: setting_points  
                then:  
                  switch.turn_off: setting_points                  
      - if:     
          condition: 
            switch.is_off: setting_points 
          then: 
            - if:     
                condition:  
                  switch.is_on: cansel
                then:  
                  switch.turn_off: cansel          
            - if:     
                condition:  
                  switch.is_on: work_points 
                then:  
                  switch.turn_off: work_points   
            - if:     
                condition:  
                  switch.is_on: week_points 
                then:  
                  switch.turn_off: week_points 
          else:
            - if:     
                condition: 
                  binary_sensor.is_off: flag_work_week  
                then: 
                  - if:     
                      condition:  
                        switch.is_on: week_points  
                      then:  
                        - if:     
                            condition:  
                              switch.is_on: work_points 
                            then:  
                              switch.turn_off: work_points  
                else:              
                  - if:     
                      condition: 
                        or:
                          - switch.is_on: work_points 
                          - lambda: |- 
                              std::string current = id(select_week).current_option();
                              return current ==  "7 days";
                      then:  
                        - if:     
                            condition:  
                              switch.is_on: week_points 
                            then:  
                              switch.turn_off: week_points 
                              
            - if:     
                condition: 
                  and:
                    - switch.is_off: save
                    - switch.is_off: cansel
                then:                              
                  - if:     
                      condition: 
                        and:
                          - switch.is_on: work_points  
                      then:  
                        - if:     
                            condition:  
                              or:
                                - lambda: |-  
                                    return !(id(thermostat_component).datapoint_id_1.has_value() && id(thermostat_component).datapoint_id_2.has_value() && \
                                          id(thermostat_component).datapoint_id_1->id == 119 && id(thermostat_component).datapoint_id_2->id == 120); 
                            then:
                              lambda: |- 
                                id(thermostat_component).get_datapoint_addition (119, false);
                                id(thermostat_component).get_datapoint_addition (120, true);
                  - if:     
                      condition: 
                        and:
                          - switch.is_on: week_points  
                      then: 
                        - if:     
                            condition: 
                              or:
                                - lambda: |-  
                                    return !(id(thermostat_component).datapoint_id_1.has_value() && id(thermostat_component).datapoint_id_2.has_value() && \
                                          id(thermostat_component).datapoint_id_1->id == 121 && id(thermostat_component).datapoint_id_2->id == 122); 
                            then:
                              lambda: |- 
                                id(thermostat_component).get_datapoint_addition (121, false); 
                                id(thermostat_component).get_datapoint_addition (122, true);
                  - if:     
                      condition: 
                        and:
                          - lambda: |-  
                              return id(thermostat_component).datapoint_id_1.has_value() && id(thermostat_component).datapoint_id_2.has_value(); 
                      then: 
                        lambda: |-  
                          float i = (id(thermostat_component).datapoint_id_1->value_raw[0] & 0x7F) * 60 + (id(thermostat_component).datapoint_id_1->value_raw[1] & 0x7F);
                          if ( i >= 23 * 60 + 54) {
                            i = 0;
                          }  
                          id(number_hour_1).publish_state((int)(i/60));
                          id(number_minutes_1).publish_state((int)((i/60 - id(number_hour_1).state)*60)); 
                          id(number_temperature_1).publish_state(id(thermostat_component).datapoint_id_1->value_raw[2] & 0x7F);  
                          float j = (id(thermostat_component).datapoint_id_1->value_raw[3] & 0x7F) * 60 + (id(thermostat_component).datapoint_id_1->value_raw[4] & 0x7F);
                          if ( i >= j ) {
                            j = i + 1;       
                          } 
                          id(number_hour_2).publish_state((int)(j/60));
                          id(number_minutes_2).publish_state((int)((j/60 - id(number_hour_2).state)*60)); 
                          id(number_temperature_2).publish_state(id(thermostat_component).datapoint_id_1->value_raw[5] & 0x7F);   
                          i = (id(thermostat_component).datapoint_id_1->value_raw[6] & 0x7F) * 60 + (id(thermostat_component).datapoint_id_1->value_raw[7] & 0x7F);
                          if ( j >= i ) {
                            i = j + 1;       
                          } 
                          id(number_hour_3).publish_state((int)(i/60));
                          id(number_minutes_3).publish_state((int)((i/60 - id(number_hour_3).state)*60)); 
                          id(number_temperature_3).publish_state(id(thermostat_component).datapoint_id_1->value_raw[8] & 0x7F);  
                          j = (id(thermostat_component).datapoint_id_2->value_raw[0] & 0x7F) * 60 + (id(thermostat_component).datapoint_id_2->value_raw[1] & 0x7F);
                          if ( i >= j ) {
                            j = i + 1;       
                          } 
                          id(number_hour_4).publish_state((int)(j/60));
                          id(number_minutes_4).publish_state((int)((j/60 - id(number_hour_4).state)*60)); 
                          id(number_temperature_4).publish_state(id(thermostat_component).datapoint_id_2->value_raw[2] & 0x7F);  
                          i = (id(thermostat_component).datapoint_id_2->value_raw[3] & 0x7F) * 60 + (id(thermostat_component).datapoint_id_2->value_raw[4] & 0x7F);
                          if ( j >= i ) {
                            i = j + 1;       
                          }
                          id(number_hour_5).publish_state((int)(i/60));
                          id(number_minutes_5).publish_state((int)((i/60 - id(number_hour_5).state)*60)); 
                          id(number_temperature_5).publish_state(id(thermostat_component).datapoint_id_2->value_raw[5] & 0x7F);  
                          j = (id(thermostat_component).datapoint_id_2->value_raw[6] & 0x7F) * 60 + (id(thermostat_component).datapoint_id_2->value_raw[7] & 0x7F);
                          if ( i >= j ) {
                            j = i + 1;       
                          } 
                          id(number_hour_6).publish_state((int)(j/60));
                          id(number_minutes_6).publish_state((int)((j/60 - id(number_hour_6).state)*60)); 
                          id(number_temperature_6).publish_state(id(thermostat_component).datapoint_id_2->value_raw[8] & 0x7F);  
      - if:     
          condition: 
            and:
              - switch.is_off: work_points  
              - switch.is_off: week_points    
          then: 
            - if:     
                condition:  
                  switch.is_on: cansel
                then:  
                  switch.turn_off: cansel 
      - if:     
          condition: 
            switch.is_on: save  
          then: 
            - if:     
                condition:  
                  switch.is_off: cansel
                then:  
                  switch.turn_off: save  
                else:          
                  script.execute: script_number                 
                  
  - id: script_number
    mode: queued
    then:
      - if:     
          condition:
            and:
              - switch.is_on: switch_power
              - switch.is_off: lock_datapoint
              - and:
                  or:
                    - and:
                        - switch.is_off: work_points  
                        - switch.is_on: week_points  
                    - and:
                        - switch.is_on: work_points  
                        - switch.is_off: week_points                              
          then: 
            - script.stop: script_lock_on
            - script.execute: script_lock_on 
            - lambda: |-
                std::vector<uint8_t> value_points {};
                std::vector<uint8_t> value_points_1 {};            
                float x = id(sending_number_x).state;
                switch ((int)id(sending_number).state) {
                  case 0:
                    if ((x * 60 + id(number_minutes_1).state) >= (id(number_hour_2).state * 60 + id(number_minutes_2).state) || \
                      (x * 60 + id(number_minutes_1).state) >= (id(number_hour_6).state * 60 + id(number_minutes_6).state)) { 
                      x = id(number_hour_1).state; 
                    id(number_hour_1).publish_state(x + 1);
                    }
                    id(number_hour_1).publish_state(x);  
                    break; 
                  case 1:
                    if ((id(number_hour_1).state * 60  + x ) >= (id(number_hour_2).state * 60 + id(number_minutes_2).state) || \
                      (id(number_hour_1).state * 60  + x ) >= (id(number_hour_6).state * 60 + id(number_minutes_6).state)) { 
                      x = id(number_minutes_1).state;  
                    id(number_minutes_1).publish_state(x + 1);
                    }
                    id(number_minutes_1).publish_state(x); 
                    break;  
                  case 2:
                    if (x > id(number_max_temperature).state) {
                      x = id(number_max_temperature).state; 
                      id(number_temperature_1).publish_state(x - 1); 
                    }  
                    if (x < id(number_min_temperature).state) {
                      x = id(number_min_temperature).state; 
                      id(number_temperature_1).publish_state(x + 1); 
                    }               
                    id(number_temperature_1).publish_state(x);   
                    break;   
                  case 3:
                    if ((x * 60 + id(number_minutes_2).state) <= (id(number_hour_1).state * 60 + id(number_minutes_1).state) || \
                      (x * 60 + id(number_minutes_2).state) >= (id(number_hour_3).state * 60 + id(number_minutes_3).state)) { 
                      x = id(number_hour_2).state; 
                    id(number_hour_2).publish_state(x + 1);
                    }
                    id(number_hour_2).publish_state(x);   
                    break; 
                  case 4:
                    if ((id(number_hour_2).state * 60  + x ) <= (id(number_hour_1).state * 60 + id(number_minutes_1).state) || \
                      (id(number_hour_2).state * 60  + x ) >= (id(number_hour_3).state * 60 + id(number_minutes_3).state)) { 
                      x = id(number_minutes_2).state;  
                    id(number_minutes_2).publish_state(x + 1);
                    }
                    id(number_minutes_2).publish_state(x);    
                    break;  
                  case 5:
                    if (x > id(number_max_temperature).state) {
                      x = id(number_max_temperature).state; 
                      id(number_temperature_2).publish_state(x - 1); 
                    }  
                    if (x < id(number_min_temperature).state) {
                      x = id(number_min_temperature).state; 
                      id(number_temperature_2).publish_state(x + 1); 
                    }               
