  - platform: template 
    name: "error"  
    id: error
    icon: mdi:alert-outline
    update_interval: never

  - platform: template 
    name: "Access point"  
    id: point_bssid
    icon: mdi:router-wireless
    update_interval: never
      
  - platform: version
    name: "ESPHome Version"    

  - platform: wifi_info
    ip_address:
      icon: mdi:ip  
      name: "IP"   
    ssid:
      icon: mdi:wifi-lock 
      name: "SSID"
    mac_address:
      name: "Mac Wifi"  
    bssid:
      name: "BSSID"  
      id: bssid_point
      on_raw_value:
        then:
          - if:
              condition: 
                lambda: |-
                  return x != "" && x != "Нет данных"; 
              then:
                - text_sensor.template.publish:
                    id: point_bssid
                    state: !lambda |-
                      if (strcasecmp(x.c_str(), "${bssid_1}") == 0) return "${wifi_bssid_1_}";
                      if (strcasecmp(x.c_str(), "${bssid_2}") == 0) return "${wifi_bssid_2_}";
                      if (strcasecmp(x.c_str(), "${bssid_3}") == 0) return "${wifi_bssid_3_}";
                      if (strcasecmp(x.c_str(), "${bssid_4}") == 0) return "${wifi_bssid_4_}";
