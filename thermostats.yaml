esphome:
  name: $hostname
  friendly_name: $friendly_name   
  area: $installation_area  
  on_boot:
    priority: 600
    then:
      - lambda: |-   
          id(thermostat_component).my_global_mode = id(my_global_mode);
      - text_sensor.template.publish:
          id: point_bssid
          state: "Нет данных"   
      - text_sensor.template.publish:
          id: bssid_point
          state: "Нет данных"           
          

esp8266:
  board: esp01_1m
  restore_from_flash: true  
          

# Enable logging
logger:
  level: NONE
  baud_rate: 0 


wifi:
  min_auth_mode: WPA2
  reboot_timeout: $reboot_timeout # Если сети нет вообще 15 минут, плата перезагрузится для профилактики
  fast_connect: false   # СТРОГО FALSE! Это заставит плату всегда выбирать НАИЛУЧШИЙ сигнал (RSSI)
  power_save_mode: NONE
#  use_address: 192.168.100.154    
  
  networks:
    - ssid: !secret wifi_ssid_house_hall
      password: !secret wifi_password
  
    - ssid: !secret wifi_ssid_plus
      password: !secret wifi_password_home

    - ssid: !secret wifi_ssid_house_bedroom_iot
      password: !secret wifi_password
  
    - ssid: !secret wifi_ssid_house_bedroom_reserve
      password: !secret wifi_password
  
    - ssid: !secret wifi_ssid_house_living_room 
      password: !secret wifi_password
 
