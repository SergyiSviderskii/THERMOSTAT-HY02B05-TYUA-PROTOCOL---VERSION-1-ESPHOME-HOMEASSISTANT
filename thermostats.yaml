    update_interval: 60s
    # Вместо on_value_range используем ручную проверку при каждом обновлении
    on_value:
      then:
        - if:
            condition:
              # Проверяем, что сигнал действительно хуже -85
              - lambda: 'return id(bania_wifi_signal).state < -85.0;'
              # ЗАЩИТА: проверяем, что плата подключена к сети уже больше 5 минут
              # Это не даст ей сканировать эфир по кругу слишком часто
              - lambda: 'return id(bania_wifi_signal).has_state();' 
            then:
              - logger.log: "Сигнал плохой! Пробую найти точку лучше..."
              - lambda: |-
                  esphome::wifi::global_wifi_component->start_scanning();
              # Даем плате передышку в 5 минут, отключая этот опрос, чтобы она не зациклилась
