      password: !secret wifi_password
  
    - ssid: !secret wifi_ssid_house_garret
      password: !secret wifi_password
  
    - ssid: !secret wifi_ssid_house_garage
      password: !secret wifi_password
   
    - ssid: !secret wifi_ssid_bath_garret    
      password: !secret wifi_password
  
    - ssid: !secret wifi_ssid_bath_garret_1     
      password: !secret wifi_password
  
      
